<!-- Modal de Cadastro de Empresas - Naviê Vibe (Vanilla CSS Version) -->
<style>
    #modal-empresa {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(3, 7, 18, 0.85);
        backdrop-filter: blur(8px);
        z-index: 9999;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        box-sizing: border-box;
        overflow-y: auto;
    }

    #modal-content {
        position: relative;
        width: 100%;
        max-width: 650px;
        background: #fff;
        border-radius: 2rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        /* overflow: hidden removido para evitar corte do dropdown */
        opacity: 0;
        transform: scale(0.95);
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        margin: auto;
    }

    .modal-header {
        position: relative;
        height: 120px;
        background: #1e3a8a;
        display: flex;
        align-items: center;
        padding: 0 2.5rem;
        overflow: hidden;
        border-radius: 2rem 2rem 0 0; /* Garante arredondamento no topo */
    }

    .modal-header::before {
        content: '';
        position: absolute;
        top: -50px;
        right: -50px;
        width: 150px;
        height: 150px;
        background: rgba(59, 130, 246, 0.3);
        border-radius: 50%;
        filter: blur(40px);
    }

    .modal-close {
        position: absolute;
        top: 1.5rem;
        right: 1.5rem;
        background: rgba(255,255,255,0.1);
        border: none;
        color: rgba(255,255,255,0.6);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
        z-index: 10;
    }

    .modal-close:hover {
        background: rgba(255,255,255,0.2);
        color: #fff;
    }

    .progress-bar-container {
        display: flex;
        padding: 2rem 2.5rem 1rem;
        gap: 0.5rem;
    }

    .progress-track {
        flex: 1;
        height: 6px;
        background: #eff6ff;
        border-radius: 10px;
        overflow: hidden;
    }

    .progress-fill {
        height: 100%;
        background: #2563eb;
        width: 0%;
        transition: width 0.5s ease;
    }

    .form-step {
        padding: 1.5rem 2.5rem 2.5rem;
    }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.25rem;
    }

    @media (max-width: 640px) {
        .form-grid { grid-template-columns: 1fr; }
    }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .input-label {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #94a3b8;
        padding-left: 0.25rem;
    }

    .input-field {
        width: 100%;
        padding: 0.875rem 1.25rem;
        background: #f8fafc;
        border: 1px solid #f1f5f9;
        border-radius: 1rem;
        outline: none;
        font-size: 0.95rem;
        transition: all 0.2s;
    }

    .input-field:focus {
        background: #fff;
        border-color: #3b82f6;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    .btn-next, .btn-submit {
        background: #2563eb;
        color: #fff;
        font-weight: 700;
        padding: 0.875rem 2rem;
        border-radius: 1rem;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.3s;
        box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
    }

    .btn-next:hover, .btn-submit:hover {
        background: #1d4ed8;
        transform: translateY(-2px);
    }

    .btn-back {
        background: none;
        border: none;
        color: #94a3b8;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: color 0.2s;
    }

    .btn-back:hover { color: #64748b; }

    .checkbox-card {
        background: rgba(239, 246, 255, 0.5);
        border: 1px solid rgba(191, 219, 254, 0.5);
        border-radius: 1.25rem;
        padding: 1.25rem;
        margin-top: 1rem;
    }

    .checkbox-row {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
        cursor: pointer;
    }

    .checkbox-row input {
        width: 18px;
        height: 18px;
        margin-top: 2px;
    }

    .success-container {
        text-align: center;
        padding: 3rem 1.5rem;
    }

    .input-error {
        border-color: #ef4444 !important;
        background: #fef2f2 !important;
    }

    .error-message {
        color: #ef4444;
        font-size: 0.7rem;
        font-weight: 600;
        margin-top: 2px;
        padding-left: 0.25rem;
    }

    /* Custom Select Styles */
    .custom-select-wrapper {
        position: relative;
        cursor: pointer;
    }

    .custom-select-trigger {
        width: 100%;
        padding: 0.875rem 1.25rem;
        background: #f8fafc;
        border: 1px solid #f1f5f9;
        border-radius: 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.95rem;
        transition: all 0.2s;
    }

    .custom-select-trigger:hover {
        background: #f1f5f9;
    }

    .custom-select-wrapper.active .custom-select-trigger {
        background: #fff;
        border-color: #3b82f6;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    .custom-options {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        right: 0;
        background: #fff;
        border-radius: 1.25rem;
        border: 1px solid #f1f5f9;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        z-index: 100;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10px);
        transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        padding: 0.5rem;
        list-style: none;
        margin: 0;
    }

    .custom-select-wrapper.active .custom-options {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }

    .custom-option {
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        font-size: 0.9rem;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: #475569;
    }

    .custom-option:hover {
        background: #eff6ff;
        color: #1e40af;
    }

    .custom-option.selected {
        background: #2563eb;
        color: #fff;
    }

    .hidden { display: none !important; }
</style>

<div id="modal-empresa" onclick="if(event.target === this) toggleModalEmpresa(false)">
    <div id="modal-content">
        <!-- Header -->
        <div class="modal-header">
            <div style="display: flex; align-items: center; gap: 1rem; position: relative; z-index: 2;">
                <div style="width: 55px; height: 55px; background: rgba(255,255,255,0.1); border-radius: 16px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2);">
                    <i data-lucide="building-2" style="color:#fff; width: 28px; height: 28px;"></i>
                </div>
                <div>
                    <h2 style="color:#fff; margin:0; font-size: 1.5rem; font-weight: 900;">Seja um Parceiro</h2>
                    <p style="color: rgba(255,255,255,0.6); margin:0; font-size: 0.85rem;">Junte-se à vitrine da Ibiapaba</p>
                </div>
            </div>
            <button class="modal-close" onclick="toggleModalEmpresa(false)">
                <i data-lucide="x"></i>
            </button>
        </div>

        <!-- Progress -->
        <div class="progress-bar-container">
            <div class="progress-track"><div id="step-prog-1" class="progress-fill"></div></div>
            <div class="progress-track"><div id="step-prog-2" class="progress-fill"></div></div>
            <div class="progress-track"><div id="step-prog-3" class="progress-fill"></div></div>
        </div>

        <!-- Form -->
        <form id="form-solicitacao-parceria" novalidate>
            {% csrf_token %}
            
            <!-- STEP 1 -->
            <div id="step-1" class="form-step">
                <div class="form-grid">
                    <div class="input-group">
                        <label class="input-label">Razão Social</label>
                        <input type="text" name="razao_social" required placeholder="Sua Empresa LTDA" class="input-field">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Nome Fantasia</label>
                        <input type="text" name="nome_fantasia" required placeholder="Como o público te conhece" class="input-field">
                    </div>
                    <div class="input-group">
                        <label class="input-label">CNPJ</label>
                        <input type="text" name="cnpj" required placeholder="00.000.000/0000-00" class="input-field">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Tipo de Negócio</label>
                        <div class="custom-select-wrapper" id="custom-select-tipo">
                            <input type="hidden" name="tipo_empresa" id="tipo_empresa_hidden" required value="hotel_pousada">
                            <div class="custom-select-trigger">
                                <span id="selected-text" style="display:flex; align-items:center; gap:0.75rem;">
                                    <i data-lucide="hotel" style="width:18px;height:18px;"></i> Hotel / Pousada
                                </span>
                                <i data-lucide="chevron-down" style="width: 18px; height: 18px; color: #94a3b8;"></i>
                            </div>
                            <ul class="custom-options">
                                <li class="custom-option selected" data-value="hotel_pousada">
                                    <i data-lucide="hotel" style="width:18px;height:18px;"></i> Hotel / Pousada
                                </li>
                                <li class="custom-option" data-value="cinema">
                                    <i data-lucide="clapperboard" style="width:18px;height:18px;"></i> Cinema
                                </li>
                                <li class="custom-option" data-value="casa_shows">
                                    <i data-lucide="music-4" style="width:18px;height:18px;"></i> Shows & Eventos
                                </li>
                                <li class="custom-option" data-value="parque_turismo">
                                    <i data-lucide="mountain-snow" style="width:18px;height:18px;"></i> Parque / Atrações
                                </li>
                                <li class="custom-option" data-value="outro">
                                    <i data-lucide="sparkles" style="width:18px;height:18px;"></i> Outro
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div style="display: flex; justify-content: flex-end; margin-top: 2rem;">
                    <button type="button" onclick="goToStep(2)" class="btn-next">
                        Próximo passo <i data-lucide="arrow-right"></i>
                    </button>
                </div>
            </div>

            <!-- STEP 2 -->
            <div id="step-2" class="form-step hidden">
                <div class="form-grid">
                    <div class="input-group">
                        <label class="input-label">Seu Nome</label>
                        <input type="text" name="responsavel_nome" required placeholder="Responsável pelo cadastro" class="input-field">
                    </div>
                    <div class="input-group">
                        <label class="input-label">WhatsApp</label>
                        <input type="text" name="responsavel_telefone" required placeholder="(88) 9 0000-0000" class="input-field">
                    </div>
                    <div class="input-group">
                        <label class="input-label">E-mail Corporativo</label>
                        <input type="email" name="responsavel_email" required placeholder="parceria@empresa.com" class="input-field">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Seu Cargo / Função</label>
                        <input type="text" name="responsavel_cargo" required placeholder="Ex: Proprietário" class="input-field">
                    </div>
                    
                    <!-- Bloco de Endereço -->
                    <div class="input-group">
                        <label class="input-label">CEP</label>
                        <div style="display:flex; gap:0.5rem;">
                            <input type="text" name="cep" id="cep_field" required placeholder="00000-000" class="input-field" maxlength="9">
                            <button type="button" id="btn-busca-cep" style="background:#f1f5f9; border:none; border-radius:1rem; padding:0 0.75rem; color:#64748b; cursor:pointer;" title="Buscar CEP">
                                <i data-lucide="search" style="width:18px; height:18px;"></i>
                            </button>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Estado (UF)</label>
                        <input type="text" name="estado" id="estado_field" required placeholder="Ex: CE" class="input-field" maxlength="2">
                    </div>
                    <div class="input-group" style="grid-column: span 2;">
                        <label class="input-label">Logradouro (Rua/Av)</label>
                        <input type="text" name="endereco" id="endereco_field" required placeholder="Ex: Av. Sete de Setembro" class="input-field">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Bairro</label>
                        <input type="text" name="bairro" id="bairro_field" required placeholder="Ex: Centro" class="input-field">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Número</label>
                        <input type="text" name="numero" id="numero_field" required placeholder="Ex: 123" class="input-field">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Cidade</label>
                        <input type="text" name="cidade" id="cidade_field" required placeholder="Ex: Tianguá" class="input-field">
                    </div>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 2rem;">
                    <button type="button" onclick="goToStep(1)" class="btn-back">
                        <i data-lucide="arrow-left"></i> Voltar
                    </button>
                    <button type="button" onclick="goToStep(3)" class="btn-next">
                        Quase lá <i data-lucide="arrow-right"></i>
                    </button>
                </div>
            </div>

            <!-- STEP 3 -->
            <div id="step-3" class="form-step hidden">
                <div class="input-group">
                    <label class="input-label">Descrição do Negócio</label>
                    <textarea name="descricao_negocio" required rows="3" placeholder="Conte brevemente sobre o que vocês fazem..." class="input-field" style="resize: none;"></textarea>
                </div>
                <div class="checkbox-card">
                    <label class="checkbox-row">
                        <input type="checkbox" name="aceite_termos" required id="aceite_termos">
                        <span style="font-size: 0.85rem; color: #475569;">Aceito os <a href="/parceiros/doc/termos-parceria/" target="_blank" style="color:#2563eb; font-weight:700; text-decoration:none;">Termos de Parceria</a></span>
                    </label>
                    <label class="checkbox-row">
                        <input type="checkbox" name="aceite_privacidade" required id="aceite_privacidade">
                        <span style="font-size: 0.85rem; color: #475569;">Aceito a <a href="/parceiros/doc/politica-privacidade/" target="_blank" style="color:#2563eb; font-weight:700; text-decoration:none;">Política de Privacidade</a></span>
                    </label>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 2rem;">
                    <button type="button" onclick="goToStep(2)" class="btn-back">
                        <i data-lucide="arrow-left"></i> Voltar
                    </button>
                    <button type="submit" id="btn-submit-parceria" class="btn-submit" style="background:#059669;">
                        Solicitar Acesso <i data-lucide="check-circle"></i>
                    </button>
                </div>
            </div>

            <!-- SUCCESS -->
            <div id="step-success" class="success-container hidden">
                <div style="width: 80px; height: 80px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                    <i data-lucide="party-popper" style="color:#16a34a; width: 40px; height: 40px;"></i>
                </div>
                <h3 style="font-size: 1.75rem; font-weight: 900; color: #0f172a; margin-bottom: 0.5rem;">Solicitação Enviada!</h3>
                <p style="color: #64748b; margin-bottom: 2rem; max-width: 300px; margin-left: auto; margin-right: auto;">Recebemos seus dados. Entraremos em contato via WhatsApp em breve.</p>
                <button type="button" onclick="toggleModalEmpresa(false)" class="btn-next" style="background: #0f172a; margin: 0 auto;">Entendido</button>
            </div>
        </form>
    </div>
</div>

<script>
    function validateStep(step) {
        const container = document.getElementById(`step-${step}`);
        const inputs = container.querySelectorAll('input[required], select[required], textarea[required]');
        let isValid = true;

        inputs.forEach(input => {
            // Remove erro anterior
            input.classList.remove('input-error');
            const oldMsg = input.parentNode.querySelector('.error-message');
            if (oldMsg) oldMsg.remove();

            if (!input.value.trim() || (input.type === 'checkbox' && !input.checked)) {
                isValid = false;
                input.classList.add('input-error');
                
                const msg = document.createElement('span');
                msg.className = 'error-message';
                msg.innerText = 'Este campo é obrigatório';
                input.parentNode.appendChild(msg);
            }
        });

        return isValid;
    }

    function toggleModalEmpresa(show) {
        const modal = document.getElementById('modal-empresa');
        const content = document.getElementById('modal-content');
        
        if (show) {
            modal.style.display = 'flex';
            setTimeout(() => {
                content.style.opacity = '1';
                content.style.transform = 'scale(1)';
            }, 10);
            goToStep(1);
        } else {
            content.style.opacity = '0';
            content.style.transform = 'scale(0.95)';
            setTimeout(() => {
                modal.style.display = 'none';
            }, 400);
        }
    }

    function goToStep(step) {
        // Valida o passo atual antes de avançar
        if (step > currentStep) {
            if (!validateStep(currentStep)) return;
        }

        [1, 2, 3].forEach(s => {
            const stepEl = document.getElementById(`step-${s}`);
            const progEl = document.getElementById(`step-prog-${s}`);
            if (stepEl) stepEl.classList.add('hidden');
            if (progEl) progEl.style.width = s <= step ? '100%' : '0%';
        });
        
        const currentEl = document.getElementById(`step-${step}`);
        if(currentEl) currentEl.classList.remove('hidden');
        currentStep = step;
        lucide.createIcons();
    }

    document.getElementById('form-solicitacao-parceria').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        if (!validateStep(3)) return;

        const btn = document.getElementById('btn-submit-parceria');
        const originalText = btn.innerHTML;
        
        btn.disabled = true;
        btn.innerHTML = 'Enviando...';

        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());
        
        data.aceite_termos = document.getElementById('aceite_termos').checked;
        data.aceite_privacidade = document.getElementById('aceite_privacidade').checked;

        try {
            const response = await fetch('/parceiros/solicitar/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (result.ok) {
                [1, 2, 3].forEach(s => {
                    const el = document.getElementById(`step-${s}`);
                    if(el) el.classList.add('hidden');
                });
                document.getElementById('step-success').classList.remove('hidden');
                lucide.createIcons();
            } else {
                alert('Erro: ' + (result.erro || 'Não foi possível enviar a solicitação.'));
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        } catch (error) {
            alert('Houve um erro técnico. Tente novamente mais tarde.');
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    });

    // Integração ViaCEP
    const cepField = document.getElementById('cep_field');
    const btnBusca = document.getElementById('btn-busca-cep');
    
    async function buscaCEP() {
        const cep = cepField.value.replace(/\D/g, '');
        if (cep.length !== 8) return;

        btnBusca.innerHTML = '<i data-lucide="loader-2" class="animate-spin"></i>';
        lucide.createIcons();

        try {
            const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await response.json();

            if (!data.erro) {
                document.getElementById('endereco_field').value = data.logradouro || '';
                document.getElementById('bairro_field').value = data.bairro || '';
                document.getElementById('cidade_field').value = data.localidade || '';
                document.getElementById('estado_field').value = data.uf || '';
                
                // Focar no número após preencher
                document.getElementById('numero_field').focus();
            }
        } catch (error) {
            console.error('Erro ao buscar CEP:', error);
        } finally {
            btnBusca.innerHTML = '<i data-lucide="search"></i>';
            lucide.createIcons();
        }
    }

    cepField.addEventListener('blur', buscaCEP);
    btnBusca.addEventListener('click', buscaCEP);

    // Formatação de CEP
    cepField.addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 5) v = v.slice(0, 5) + '-' + v.slice(5, 8);
        e.target.value = v;
    });

    let currentStep = 1;

    // Lógica do Custom Select
    document.addEventListener('DOMContentLoaded', () => {
        const wrapper = document.getElementById('custom-select-tipo');
        if (!wrapper) return;

        const trigger = wrapper.querySelector('.custom-select-trigger');
        const hiddenInput = document.getElementById('tipo_empresa_hidden');
        const options = wrapper.querySelectorAll('.custom-option');
        const selectedText = document.getElementById('selected-text');

        trigger.addEventListener('click', (e) => {
            wrapper.classList.toggle('active');
            e.stopPropagation();
        });

        options.forEach(opt => {
            opt.addEventListener('click', (e) => {
                const val = opt.getAttribute('data-value');
                hiddenInput.value = val;
                selectedText.innerHTML = opt.innerHTML;
                
                options.forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                
                wrapper.classList.remove('active');
                e.stopPropagation();
            });
        });

        document.addEventListener('click', () => {
            wrapper.classList.remove('active');
        });

        if(typeof lucide !== 'undefined') lucide.createIcons();
    });
</script>
