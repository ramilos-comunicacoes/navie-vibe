<div id="availabilityModal" class="fixed inset-0 z-[300] hidden items-center justify-center bg-black/55 backdrop-blur-xs transition-all duration-300" onclick="closeAvailabilityModalOnBgClick(event)">
    <div class="bg-white rounded-[2.5rem] w-full max-w-md mx-4 shadow-[0_30px_60px_rgba(0,0,0,0.3)] flex flex-col relative overflow-hidden modal-card-grid">
        <button onclick="closeAvailabilityModal()" class="absolute top-4 right-4 w-9 h-9 rounded-full border flex items-center justify-center shadow-xs bg-white hover:scale-105 close-btn-brand"><i data-lucide="x" class="w-4 h-4 font-black"></i></button>

        <div class="px-6 pt-7 pb-4 border-b border-gray-100 bg-white modal-header-area">
            <span id="calendar-instruction-badge" class="tag-pill-display inline-flex mb-2">Check-in</span>
            <h3 id="calendar-title-instruction" class="text-xl font-black text-gray-900 leading-tight tracking-tight">Dia da entrada (check-in)</h3>
            <p id="calendar-subtitle-instruction" class="text-xs text-gray-400 font-bold mt-1">Selecione o dia do seu check-in no calendário</p>
        </div>

        <div class="p-6 flex-1 flex flex-col bg-white modal-calendar-area">
            <div class="flex items-center justify-between mb-4">
                <button onclick="changeMonth(-1)" class="p-2 rounded-xl hover:bg-gray-100 text-gray-600"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                <h4 id="calendar-current-month" class="font-black text-sm text-gray-800 uppercase tracking-wider">Maio 2026</h4>
                <button onclick="changeMonth(1)" class="p-2 rounded-xl hover:bg-gray-100 text-gray-600"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
            </div>

            <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-black text-gray-400 uppercase tracking-wider mb-2">
                <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
            </div>
            <div id="calendar-days-grid" class="grid grid-cols-7 gap-1.5 text-center text-xs"></div>
        </div>

        <div class="px-6 py-5 bg-slate-50 border-t border-gray-100 flex flex-col gap-4 modal-footer-area">
            <div class="grid grid-cols-11 items-center bg-white rounded-2xl p-3.5 border border-slate-100">
                <div class="col-span-5 flex flex-col text-left">
                    <span class="text-[8px] font-black uppercase tracking-wider text-gray-400">Entrada</span>
                    <span id="summary-checkin" class="text-xs font-black text-gray-800 mt-0.5">-</span>
                </div>
                <div class="col-span-1 flex justify-center"><i data-lucide="arrow-right" class="w-3.5 h-3.5 text-slate-300"></i></div>
                <div class="col-span-5 flex flex-col text-right">
                    <span class="text-[8px] font-black uppercase tracking-wider text-gray-400">Saída</span>
                    <span id="summary-checkout" class="text-xs font-black text-gray-800 mt-0.5">-</span>
                </div>
            </div>
            <button id="btn-confirm-dates" disabled onclick="confirmAvailabilityPeriod()" class="w-full text-white font-black py-4 px-6 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2 text-sm confirm-btn-brand"><i data-lucide="calendar-check" class="w-4 h-4"></i>Confirmar Período</button>
        </div>
    </div>
</div>

<style>
    @media (min-width: 768px) {
        .modal-card-grid {
            display: grid !important;
            grid-template-areas: "calendar header" "calendar footer";
            grid-template-columns: 1.25fr 1fr;
            grid-template-rows: auto 1fr;
            max-width: 760px !important;
        }
        .modal-calendar-area { grid-area: calendar; border-right: 1px solid #f1f5f9; }
        .modal-header-area { grid-area: header; }
        .modal-footer-area { grid-area: footer; background-color: #ffffff !important; }
    }

    .close-btn-brand { border-color: var(--brand-color-burned) !important; color: var(--brand-color-burned) !important; }
    .close-btn-brand:hover { background-color: var(--brand-color) !important; color: var(--brand-text-color) !important; }
    .confirm-btn-brand { background-color: var(--brand-color) !important; color: var(--brand-text-color) !important; }
    .confirm-btn-brand:hover:not(:disabled) { background-color: var(--brand-color-burned) !important; }

    .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: 700; transition: all 0.2s ease; cursor: pointer; }
    .cal-day-available { color: #334155; }
    .cal-day-available:hover { background-color: #f1f5f9; transform: scale(1.05); }
    .cal-day-unavailable { color: #cbd5e1 !important; background-color: #f8fafc; text-decoration: line-through; pointer-events: none; }
    .cal-day-selected { background-color: var(--brand-color) !important; color: var(--brand-text-color) !important; font-weight: 900 !important; }
    .cal-day-in-range { background-color: var(--brand-color-alpha) !important; color: var(--brand-color-burned) !important; border-radius: 6px !important; }
    .cal-day-empty { pointer-events: none; }
</style>

<script>
    const todayDate = new Date();
    todayDate.setHours(0,0,0,0);
    
    let calendarYear = todayDate.getFullYear();
    let calendarMonth = todayDate.getMonth();

    let selectedCheckIn = null;
    let selectedCheckOut = null;

    // Ocupações dinâmicas que bloqueiam dias no calendário vindas do motor de disponibilidade do backend
    const occupiedDates = new Set({{ datas_ocupadas_json|default:"[]"|safe }});
    const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

    function openAvailabilityModal() {
        const modal = document.getElementById('availabilityModal');
        modal.classList.replace('hidden', 'flex');
        resetCalendarSelections();
        renderCalendar();
        if (window.lucide) { lucide.createIcons(); }
    }

    function closeAvailabilityModal() {
        document.getElementById('availabilityModal').classList.replace('flex', 'hidden');
    }

    function closeAvailabilityModalOnBgClick(e) { if (e.target.id === 'availabilityModal') closeAvailabilityModal(); }

    function resetCalendarSelections() {
        selectedCheckIn = null; selectedCheckOut = null;
        document.getElementById('calendar-instruction-badge').textContent = "Check-in";
        document.getElementById('calendar-title-instruction').textContent = "Dia da entrada (check-in)";
        document.getElementById('summary-checkin').textContent = "-";
        document.getElementById('summary-checkout').textContent = "-";
        document.getElementById('btn-confirm-dates').disabled = true;
    }

    function changeMonth(direction) {
        calendarMonth += direction;
        if (calendarMonth < 0) { calendarMonth = 11; calendarYear -= 1; }
        else if (calendarMonth > 11) { calendarMonth = 0; calendarYear += 1; }
        renderCalendar();
    }

    function renderCalendar() {
        document.getElementById('calendar-current-month').textContent = `${monthNames[calendarMonth]} ${calendarYear}`;
        const grid = document.getElementById('calendar-days-grid');
        grid.innerHTML = '';

        const firstDayIndex = new Date(calendarYear, calendarMonth, 1).getDay();
        const totalDays = new Date(calendarYear, calendarMonth + 1, 0).getDate();

        for (let i = 0; i < firstDayIndex; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'cal-day-empty';
            grid.appendChild(emptyCell);
        }

        for (let day = 1; day <= totalDays; day++) {
            const dayCell = document.createElement('div');
            dayCell.textContent = day;
            
            const cellDate = new Date(calendarYear, calendarMonth, day); cellDate.setHours(0,0,0,0);
            const dateString = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

            const isPast = cellDate < todayDate;
            const isOccupied = occupiedDates.has(dateString);

            if (isPast || isOccupied) {
                dayCell.className = 'cal-day cal-day-unavailable';
            } else {
                dayCell.className = 'cal-day cal-day-available';

                if (selectedCheckIn && cellDate.getTime() === selectedCheckIn.getTime()) dayCell.classList.add('cal-day-selected');
                else if (selectedCheckOut && cellDate.getTime() === selectedCheckOut.getTime()) dayCell.classList.add('cal-day-selected');
                else if (selectedCheckIn && selectedCheckOut && cellDate > selectedCheckIn && cellDate < selectedCheckOut) dayCell.classList.add('cal-day-in-range');

                dayCell.onclick = () => handleDayClick(cellDate);
            }
            grid.appendChild(dayCell);
        }
    }

    function handleDayClick(date) {
        if (!selectedCheckIn || (selectedCheckIn && selectedCheckOut)) {
            selectedCheckIn = date; selectedCheckOut = null;
            document.getElementById('calendar-instruction-badge').textContent = "Checkout";
            document.getElementById('calendar-title-instruction').textContent = "Dia da saída (checkout)";
            document.getElementById('summary-checkin').textContent = formatDate(selectedCheckIn);
            document.getElementById('summary-checkout').textContent = "-";
            document.getElementById('btn-confirm-dates').disabled = true;
        } else {
            if (date <= selectedCheckIn) {
                selectedCheckIn = date;
                document.getElementById('summary-checkin').textContent = formatDate(selectedCheckIn);
            } else {
                selectedCheckOut = date;
                document.getElementById('summary-checkout').textContent = formatDate(selectedCheckOut);
                document.getElementById('calendar-instruction-badge').textContent = "Concluído";
                document.getElementById('calendar-title-instruction').textContent = "Período selecionado!";
                document.getElementById('btn-confirm-dates').disabled = false;
            }
        }
        renderCalendar();
    }

    function formatDate(date) {
        if (!date) return "-";
        return `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}/${date.getFullYear()}`;
    }

    function confirmAvailabilityPeriod() {
        closeAvailabilityModal();
        
        // Sincroniza com a barra de pesquisa da Home se ela existir
        const searchDatesInput = document.getElementById('search-dates');
        if (searchDatesInput && searchDatesInput._flatpickr) {
            searchDatesInput._flatpickr.setDate([selectedCheckIn, selectedCheckOut], true);
        }
        
        const sidebarSummary = document.getElementById('sidebar-summary-dates');
        if (sidebarSummary) {
            sidebarSummary.innerHTML = `
                <div class="mt-3 py-3 px-4 bg-amber-50 border border-amber-200 rounded-2xl text-xs text-amber-700 font-bold flex flex-col gap-1">
                    <div class="flex justify-between items-center"><span class="uppercase text-[9px] tracking-wider text-amber-500">Período</span><i data-lucide="calendar" class="w-3.5 h-3.5 text-amber-500"></i></div>
                    <div class="flex justify-between mt-1"><span>Check-in:</span><span class="font-black text-gray-800">${formatDate(selectedCheckIn)}</span></div>
                    <div class="flex justify-between"><span>Checkout:</span><span class="font-black text-gray-800">${formatDate(selectedCheckOut)}</span></div>
                </div>
            `;
            if (window.lucide) { lucide.createIcons(); }
        }

        const mainCtaText = document.getElementById('main-cta-text');
        const mainCtaButton = document.getElementById('main-cta-button');
        const mainCtaIcon = document.getElementById('main-cta-icon');
        if (mainCtaButton && mainCtaText) {
            mainCtaText.textContent = "Adicionar ao Carrinho";
            mainCtaButton.setAttribute('onclick', 'addToCartWorkflow()');
            if (mainCtaIcon) {
                mainCtaIcon.setAttribute('data-lucide', 'shopping-cart');
                if (window.lucide) { lucide.createIcons(); }
            }
        }
    }
</script>
