<div x-data="{ open: true }" x-show="open" class="fixed inset-0 z-[100] flex items-center justify-center p-4 pointer-events-auto" x-cloak>
    <!-- Backdrop Blur -->
    <div class="absolute inset-0 bg-black/75 backdrop-blur-sm transition-opacity" @click="open = false; setTimeout(() => { document.getElementById('modal-container').innerHTML = '' }, 250)"></div>
    
    <!-- Modal Content Card -->
    <div class="bg-white dark:bg-[#121212] rounded-[2.5rem] shadow-2xl border border-slate-200/50 dark:border-white/10 w-full max-w-md overflow-hidden relative z-10 p-8 transform transition-all duration-300 animate-in fade-in zoom-in-95"
         x-show="open"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0 scale-100"
         x-transition:leave-end="opacity-0 translate-y-4 scale-95">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-black text-slate-800 dark:text-white uppercase tracking-tight flex items-center gap-2">
                <span class="flex items-center text-brand" style="pointer-events:none;"><i data-lucide="user-plus" class="w-6 h-6"></i></span>
                Novo Fornecedor
            </h3>
            <button @click="open = false; setTimeout(() => { document.getElementById('modal-container').innerHTML = '' }, 250)" class="w-8 h-8 rounded-full bg-slate-100 dark:bg-white/5 text-slate-400 hover:text-slate-600 dark:hover:text-white flex items-center justify-center transition-all duration-300 hover:rotate-90 cursor-pointer">
                <span class="flex items-center" style="pointer-events:none;"><i data-lucide="x" class="w-4 h-4"></i></span>
            </button>
        </div>
        
        <!-- Form -->
        <form hx-post="{% url 'estoque:criar_fornecedor' %}" hx-target="#modal-container" class="space-y-4">
            {% csrf_token %}
            
            <!-- Nome -->
            <div>
                <label class="block text-[10px] font-bold text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-2">Razão Social / Nome Fantasia *</label>
                <input type="text" name="nome" required 
                       class="w-full input-glass rounded-2xl px-4 py-3 text-sm font-bold shadow-sm outline-none" 
                       placeholder="Ex: Distribuidora de Bebidas Ceará Ltda.">
            </div>

            <!-- CNPJ / CPF -->
            <div>
                <label class="block text-[10px] font-bold text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-2">CNPJ / CPF</label>
                <input type="text" name="cnpj_cpf" 
                       class="w-full input-glass rounded-2xl px-4 py-3 text-sm font-bold shadow-sm outline-none" 
                       placeholder="Ex: 00.000.000/0001-00">
            </div>

            <!-- Telefone e E-mail -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-2">Telefone</label>
                    <input type="text" name="telefone" 
                           class="w-full input-glass rounded-2xl px-4 py-3 text-sm font-bold shadow-sm outline-none" 
                           placeholder="Ex: (88) 99999-9999">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-2">E-mail</label>
                    <input type="email" name="email" 
                           class="w-full input-glass rounded-2xl px-4 py-3 text-sm font-semibold shadow-sm outline-none" 
                           placeholder="Ex: contato@fornecedor.com">
                </div>
            </div>
            
            <!-- Actions -->
            <div class="flex gap-4 pt-4 border-t border-slate-100 dark:border-white/5">
                <button type="button" @click="open = false; setTimeout(() => { document.getElementById('modal-container').innerHTML = '' }, 250)" 
                        class="flex-1 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest text-slate-500 dark:text-navie-textsec hover:bg-slate-50 dark:hover:bg-white/5 transition-colors">
                    Cancelar
                </button>
                <button type="submit" 
                        class="flex-1 py-4 rounded-2xl bg-brand hover:bg-brand/90 text-white font-black text-[10px] uppercase tracking-widest shadow-xl shadow-brand/20 hover:scale-[1.02] active:scale-95 transition-all">
                    Cadastrar Fornecedor
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    if(typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
</script>
