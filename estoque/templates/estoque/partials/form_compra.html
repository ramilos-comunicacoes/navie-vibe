<!-- Lógica de Sincronização com o Estado Global no Erro de Validação -->
<div x-init="
    {% if error_message %}
        compraItens = JSON.parse('{{ itens_json|escapejs }}');
        compraFornecedorId = '{{ fornecedor_selected_id|default:'' }}';
        {% if fornecedor_selected_id %}
            compraFornecedorLabel = '{% for f in fornecedores|default:fornecedores_estoque %}{% if f.id|stringformat:'s' == fornecedor_selected_id %}{{ f.nome|escapejs }}{% endif %}{% endfor %}';
        {% endif %}
        compraObservacao = '{{ observacao|escapejs }}';
        compraData = '{{ hoje|escapejs }}';
    {% endif %}
    
    // Inicializa a lista de produtos reativamente
    produtosList = [
        {% for p in produtos|default:produtos_estoque %}
        { id: '{{ p.id }}', nome: '{{ p.nome|escapejs }}', unidade: '{{ p.get_unidade_medida_display|escapejs }}' },
        {% endfor %}
    ];
">
    <!-- Alerta de Erro de Validação -->
    {% if error_message %}
    <div class="p-3 bg-red-500/10 border border-red-500/25 rounded-2xl flex items-center gap-2 text-red-500 text-xs font-black uppercase tracking-wider mb-4 animate-shake">
        <i data-lucide="alert-circle" class="w-4.5 h-4.5"></i>
        <span>{{ error_message }}</span>
    </div>
    {% endif %}

    <!-- Formulário Principal -->
    <form id="compra-form" 
          hx-post="{% url 'estoque:criar_compra' %}" 
          hx-target="#compras-form-container" 
          hx-swap="innerHTML" 
          hx-encoding="multipart/form-data" 
          class="flex-1 flex flex-col min-h-0 space-y-4 relative">
        {% csrf_token %}

        <!-- Inputs ocultos sincronizados com o subcabeçalho -->
        <input type="hidden" name="fornecedor_id" :value="compraFornecedorId">

        <!-- CONTEÚDO DA ABA: ITENS -->
        <div x-show="comprasFormTab === 'itens'" 
             x-transition:enter="transition ease-out duration-300 transform"
             x-transition:enter-start="-translate-x-8 opacity-0"
             x-transition:enter-end="translate-x-0 opacity-100"
             x-transition:leave="transition ease-in duration-150 transform absolute inset-x-0 top-0"
             x-transition:leave-start="translate-x-0 opacity-100"
             x-transition:leave-end="translate-x-8 opacity-0"
             class="flex-grow flex flex-col min-h-0 space-y-4">
             
            <!-- Top: Grand Total -->
            <div class="flex items-center justify-end px-6 py-3 bg-slate-100/50 dark:bg-white/5 rounded-3xl border border-slate-200/50 dark:border-white/5 flex-shrink-0">
                <div class="text-right">
                    <span class="text-[9px] font-black text-slate-450 dark:text-navie-textsec uppercase block tracking-wider">Total Geral</span>
                    <span class="text-xl font-black text-slate-800 dark:text-white" x-text="getCompraGrandTotal()"></span>
                </div>
            </div>

            <!-- Scrollable cards container -->
            <div class="flex-grow overflow-y-auto space-y-4 pr-1 scrollbar-thin scrollbar-thumb-slate-300 dark:scrollbar-thumb-white/10 scrollbar-track-transparent max-h-[calc(100vh-21rem)] min-h-[300px]">
                <template x-for="(item, index) in compraItens" :key="index">
                    <div class="bg-white dark:bg-white/5 border border-slate-200/50 dark:border-white/10 p-4 sm:p-5 rounded-3xl shadow-sm flex flex-col space-y-4 relative animate-in fade-in zoom-in-95 duration-200">
                        
                        <!-- Card Header -->
                        <div class="flex items-center justify-between border-b border-slate-100 dark:border-white/5 pb-2">
                            <div class="flex items-center gap-2">
                                <span class="w-5 h-5 rounded-full bg-brand/10 text-brand flex items-center justify-center text-[10px] font-black" x-text="index + 1"></span>
                                <span class="text-[10px] font-black text-slate-400 dark:text-navie-textsec uppercase tracking-wider">Item de Compra</span>
                            </div>
                            <!-- Botão remover card -->
                            <button type="button" @click="removeCompraItem(index)" 
                                    class="w-7 h-7 rounded-xl bg-red-100 hover:bg-red-200 dark:bg-red-500/10 dark:hover:bg-red-500/20 text-red-600 dark:text-red-400 flex items-center justify-center transition-all scale-100 active:scale-95 cursor-pointer">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                            </button>
                        </div>

                        <!-- Card Fields Grid -->
                        <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                            <!-- Produto Select Dropdown -->
                            <div class="col-span-1 md:col-span-4 relative">
                                <label class="block text-[9px] font-black text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-1.5">Produto</label>
                                <button @click="item.produto_select_open = !item.produto_select_open" type="button" 
                                        class="w-full input-glass rounded-xl px-3.5 py-2.5 text-xs font-bold shadow-sm outline-none flex items-center justify-between cursor-pointer border border-slate-200/50 dark:border-white/5 text-left text-slate-700 dark:text-white">
                                    <span x-text="item.produto_label" class="truncate">Selecione...</span>
                                    <svg class="w-4 h-4 text-slate-400 transition-transform duration-200 shrink-0 ml-1" :class="item.produto_select_open ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                                    </svg>
                                </button>
                                
                                <div x-show="item.produto_select_open" @click.away="item.produto_select_open = false"
                                     x-transition:enter="transition ease-out duration-100"
                                     x-transition:enter-start="opacity-0 scale-95"
                                     x-transition:enter-end="opacity-100 scale-100"
                                     x-transition:leave="transition ease-in duration-75"
                                     x-transition:leave-start="opacity-100 scale-100"
                                     x-transition:leave-end="opacity-0 scale-95"
                                     class="absolute z-[120] w-full mt-1.5 bg-white dark:bg-[#121212] border border-slate-200/80 dark:border-white/10 rounded-xl shadow-xl overflow-hidden py-1.5"
                                     style="display: none;">
                                     
                                    <!-- Search Input -->
                                    <div class="px-2 pb-1.5 border-b border-slate-100 dark:border-white/5">
                                        <div class="relative">
                                            <input type="text" x-model="item.produto_search" placeholder="Pesquisar..." 
                                                   class="w-full bg-slate-50 dark:bg-white/5 text-[10px] font-bold rounded-lg pl-7 pr-2 py-1.5 outline-none border border-slate-200/50 dark:border-white/5 text-slate-800 dark:text-white">
                                            <i data-lucide="search" class="w-3 h-3 absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                        </div>
                                    </div>
                                    
                                    <!-- Product List -->
                                    <div class="max-h-36 overflow-y-auto pt-1 space-y-0.5 scrollbar-thin">
                                        <template x-for="p in produtosList" :key="p.id">
                                            <button type="button" 
                                                    x-show="item.produto_search === '' || p.nome.toLowerCase().includes(item.produto_search.toLowerCase())"
                                                    @click="
                                                        item.produto_id = p.id; 
                                                        item.produto_label = p.nome + ' (' + p.unidade + ')'; 
                                                        item.produto_select_open = false;
                                                    " 
                                                    class="w-full text-left px-3 py-1.5 text-[10px] font-bold text-slate-655 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-white/5 transition-colors flex items-center justify-between">
                                                <span x-text="p.nome"></span>
                                                <span x-show="item.produto_id === p.id" class="text-brand flex items-center">
                                                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                                                </span>
                                            </button>
                                        </template>
                                    </div>
                                </div>
                                <input type="hidden" name="item_produto_id" :value="item.produto_id">
                            </div>

                            <!-- Quantidade -->
                            <div class="col-span-1 md:col-span-2">
                                <label class="block text-[9px] font-black text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-1.5">Quantidade</label>
                                <input type="text" name="item_quantidade" x-model="item.quantidade_raw" required 
                                       @blur="item.quantidade_raw = formatQtyDisplay(item.quantidade_raw)"
                                       class="w-full input-glass rounded-xl px-3.5 py-2.5 text-xs font-bold text-center outline-none text-slate-700 dark:text-white" 
                                       placeholder="1">
                            </div>

                            <!-- Valor Total (R$) -->
                            <div class="col-span-1 md:col-span-2">
                                <label class="block text-[9px] font-black text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-1.5">Valor Total (R$)</label>
                                <input type="text" name="item_valor_total" x-model="item.valor_total_raw" required 
                                       @blur="item.valor_total_raw = formatBRLDisplay(item.valor_total_raw)"
                                       class="w-full input-glass rounded-xl px-3.5 py-2.5 text-xs font-bold text-center outline-none text-slate-700 dark:text-white" 
                                       placeholder="0,00">
                            </div>

                            <!-- Preço Unitário (Calculado) -->
                            <div class="col-span-1 md:col-span-2 flex flex-col items-center justify-center h-full pb-2">
                                <span class="block text-[9px] font-black text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-1">Preço Unit.</span>
                                <span class="text-brand font-black text-xs" x-text="getUnitPrice(item)"></span>
                            </div>

                            <!-- Data de Validade -->
                            <div class="col-span-1 md:col-span-2">
                                <label class="block text-[9px] font-black text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-1.5">Validade</label>
                                <input type="date" name="item_validade" x-model="item.validade" 
                                       class="w-full input-glass rounded-xl px-2 py-2.5 text-xs font-bold text-center outline-none cursor-pointer text-slate-700 dark:text-white">
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- CONTEÚDO DA ABA: DOCUMENTAÇÃO -->
        <div x-show="comprasFormTab === 'documentacao'" 
             x-transition:enter="transition ease-out duration-300 transform"
             x-transition:enter-start="translate-x-8 opacity-0"
             x-transition:enter-end="translate-x-0 opacity-100"
             x-transition:leave="transition ease-in duration-150 transform absolute inset-x-0 top-0"
             x-transition:leave-start="translate-x-0 opacity-100"
             x-transition:leave-end="-translate-x-8 opacity-0"
             class="flex-grow flex flex-col min-h-0 space-y-4" x-cloak>
            <div class="bg-white dark:bg-white/5 border border-slate-200/50 dark:border-white/10 p-5 sm:p-6 rounded-3xl shadow-sm space-y-5 flex-grow flex flex-col min-h-0">
                <!-- Data & Observações -->
                <div class="grid grid-cols-1 md:grid-cols-12 gap-5 flex-shrink-0">
                    <!-- Data da Compra -->
                    <div class="col-span-1 md:col-span-3">
                        <label class="block text-[9px] font-black text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-1.5">Data da Compra</label>
                        <input type="text" name="data_compra" id="date-picker-compra-inline" x-model="compraData"
                               class="w-full input-glass rounded-xl px-4 py-3 text-xs font-bold shadow-sm outline-none cursor-pointer text-slate-700 dark:text-white" 
                               placeholder="Selecione a data">
                    </div>
                    
                    <!-- Observações -->
                    <div class="col-span-1 md:col-span-9">
                        <label class="block text-[9px] font-black text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-1.5">Observações / Notas</label>
                        <textarea name="observacao" x-model="compraObservacao" rows="3"
                                  class="w-full bg-slate-50 dark:bg-white/5 text-xs font-bold rounded-xl px-4 py-2 outline-none border border-slate-200/50 dark:border-white/5 text-slate-800 dark:text-white placeholder-slate-450"
                                  placeholder="Ex: Nota fiscal Nº 1234, pagamento via PIX..."></textarea>
                    </div>
                </div>
                
                <!-- File Upload Zone -->
                <div class="flex-grow flex flex-col min-h-[220px] border border-dashed border-slate-300 dark:border-white/10 rounded-2xl p-6 bg-slate-50/50 dark:bg-black/10 items-center justify-center text-center relative hover:bg-slate-100/50 dark:hover:bg-white/5 transition-all">
                    <input type="file" name="arquivos" multiple id="compra-arquivos-input"
                           class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                           @change="
                               let files = Array.from($event.target.files);
                               compraArquivos = files.map(f => ({ name: f.name, size: (f.size / 1024).toFixed(1) + ' KB' }));
                           ">
                    <i data-lucide="cloud-upload" class="w-8 h-8 text-brand mb-2.5 animate-pulse"></i>
                    <div class="text-[11px] font-black text-slate-700 dark:text-white uppercase tracking-wider">Arraste seus comprovantes ou Notas Fiscais aqui</div>
                    <div class="text-[9px] font-semibold text-slate-400 mt-1">Formatos suportados: PDF, PNG, JPG (Máx. 10MB)</div>
                    
                    <!-- Selecionar arquivos button helper -->
                    <button type="button" class="mt-3 px-3 py-1.5 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 text-slate-655 dark:text-slate-200 text-[9px] font-black uppercase tracking-wider rounded-lg pointer-events-none">
                        Procurar Arquivo
                    </button>
                    
                    <!-- Selected Files List -->
                    <div x-show="compraArquivos.length > 0" class="mt-4 w-full max-w-md bg-white dark:bg-[#121212] border border-slate-200/50 dark:border-white/5 rounded-xl p-3 space-y-1 shadow-sm text-left max-h-24 overflow-y-auto scrollbar-thin">
                        <template x-for="(file, fIndex) in compraArquivos" :key="fIndex">
                            <div class="flex items-center justify-between text-[9px] font-bold text-slate-600 dark:text-slate-350">
                                <span class="truncate pr-4" x-text="file.name"></span>
                                <span class="shrink-0 text-brand" x-text="file.size"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
    if (typeof flatpickr !== 'undefined') {
        flatpickr("#date-picker-compra-inline", {
            locale: "pt",
            dateFormat: "Y-m-d",
            altInput: true,
            altFormat: "d/m/Y",
            disableMobile: "true"
        });
    }
</script>
