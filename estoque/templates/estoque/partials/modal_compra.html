<div x-data="{
    open: true,
    produtosList: [
        {% for p in produtos %}
        { id: '{{ p.id }}', nome: '{{ p.nome|escapejs }}', unidade: '{{ p.get_unidade_medida_display|escapejs }}' },
        {% endfor %}
    ],
    itens: JSON.parse('{{ itens_json|escapejs }}'),
    
    init() {
        this.itens.forEach(item => {
            item.produto_select_open = false;
            item.produto_search = '';
            const prod = this.produtosList.find(p => p.id == item.produto_id);
            item.produto_label = prod ? `${prod.nome} (${prod.unidade})` : 'Selecione...';
            item.quantidade_raw = this.formatQtyDisplay(item.quantidade_raw);
            item.valor_total_raw = this.formatBRLDisplay(item.valor_total_raw);
        });
    },
    
    addItem() {
        this.itens.push({ 
            produto_id: '', 
            produto_label: 'Selecione...', 
            produto_select_open: false, 
            produto_search: '', 
            quantidade_raw: '1', 
            valor_total_raw: '0,00', 
            validade: '' 
        });
        this.$nextTick(() => {
            if(typeof lucide !== 'undefined') lucide.createIcons();
        });
    },
    
    removeItem(index) {
        if (this.itens.length > 1) {
            this.itens.splice(index, 1);
        }
    },
    
    parseNumber(val) {
        if (val === undefined || val === null || val === '') return 0;
        let clean = val.toString().replace(/\./g, '').replace(',', '.');
        let parsed = parseFloat(clean);
        return isNaN(parsed) ? 0 : parsed;
    },
    
    formatBRLDisplay(val) {
        let parsed = this.parseNumber(val);
        return parsed.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    },
    
    formatQtyDisplay(val) {
        let parsed = this.parseNumber(val);
        return parsed.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 3 });
    },
    
    getUnitPrice(item) {
        let qty = this.parseNumber(item.quantidade_raw);
        let tot = this.parseNumber(item.valor_total_raw);
        let unit = qty > 0 ? tot / qty : 0;
        return 'R$ ' + unit.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    },
    
    get grandTotal() {
        let total = 0;
        this.itens.forEach(item => {
            total += this.parseNumber(item.valor_total_raw);
        });
        return 'R$ ' + total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
}" x-show="open" class="fixed inset-0 z-[100] flex items-center justify-center p-4 pointer-events-auto" x-cloak>
    
    <!-- Backdrop Blur -->
    <div class="absolute inset-0 bg-black/75 backdrop-blur-sm transition-opacity" @click="open = false; setTimeout(() => { document.getElementById('modal-container').innerHTML = '' }, 250)"></div>
    
    <!-- Modal Content Card (max-w-4xl for wider layout, reduced padding p-5, max-h-[96vh] for taller layout closer to max screen height) -->
    <div class="bg-white dark:bg-[#121212] rounded-[2.5rem] shadow-2xl border border-slate-200/50 dark:border-white/10 w-full max-w-4xl overflow-hidden relative z-10 p-5 md:p-6 transform transition-all duration-300 animate-in fade-in zoom-in-95 flex flex-col max-h-[96vh] md:max-h-[94vh]"
         x-show="open"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0 scale-100"
         x-transition:leave-end="opacity-0 translate-y-4 scale-95">
         
        <!-- Header (Narrower padding) -->
        <div class="flex justify-between items-center pb-3 mb-4 border-b border-slate-100 dark:border-white/5 flex-shrink-0">
            <h3 class="text-base font-black text-slate-800 dark:text-white uppercase tracking-tight flex items-center gap-2">
                <span class="flex items-center text-brand" style="pointer-events:none;"><i data-lucide="shopping-bag" class="w-5 h-5"></i></span>
                Registrar Nova Compra
            </h3>
            <button type="button" @click="open = false; setTimeout(() => { document.getElementById('modal-container').innerHTML = '' }, 250)" class="w-8 h-8 rounded-full bg-slate-100 dark:bg-white/5 text-slate-400 hover:text-slate-600 dark:hover:text-white flex items-center justify-center transition-all duration-300 hover:rotate-90 cursor-pointer">
                <span class="flex items-center" style="pointer-events:none;"><i data-lucide="x" class="w-3.5 h-3.5"></i></span>
            </button>
        </div>
        
        <!-- Error alert inside modal, retaining form data -->
        {% if error_message %}
        <div class="p-3 bg-red-500/10 border border-red-500/25 rounded-2xl flex items-center gap-2 text-red-500 text-xs font-black uppercase tracking-wider mb-3 flex-shrink-0 animate-pulse">
            <span class="flex items-center" style="pointer-events:none;"><i data-lucide="alert-circle" class="w-4.5 h-4.5"></i></span>
            <span>{{ error_message }}</span>
        </div>
        {% endif %}
        
        <!-- Form -->
        <form hx-post="{% url 'estoque:criar_compra' %}" hx-target="#modal-container" class="flex-1 flex flex-col min-h-0 space-y-4">
            {% csrf_token %}
            
            <!-- Row: Fornecedor e Data -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 flex-shrink-0">
                <!-- Custom Search Select Fornecedor -->
                <div>
                    <label class="block text-[9px] font-black text-slate-450 dark:text-navie-textsec uppercase tracking-wider mb-1.5">Fornecedor</label>
                    <div x-data="{ 
                        open: false, 
                        search: '', 
                        selectedVal: '{{ fornecedor_selected_id|default:'' }}', 
                        selectedLabel: '{% if fornecedor_selected_id %}{% for f in fornecedores %}{% if f.id|stringformat:'s' == fornecedor_selected_id %}{{ f.nome|escapejs }}{% endif %}{% endfor %}{% else %}Selecione um fornecedor...{% endif %}' 
                    }" class="relative">
                        <button @click="open = !open" type="button" 
                                class="w-full input-glass rounded-xl px-4 py-3 text-xs font-bold shadow-sm outline-none flex items-center justify-between cursor-pointer border border-slate-200/50 dark:border-white/5 text-left text-slate-700 dark:text-white">
                            <span x-text="selectedLabel" class="truncate">Selecione um fornecedor...</span>
                            <svg class="w-4 h-4 text-slate-400 transition-transform duration-200 shrink-0 ml-1.5" :class="open ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>
                        
                        <div x-show="open" @click.away="open = false" 
                             x-transition:enter="transition ease-out duration-100"
                             x-transition:enter-start="opacity-0 scale-95"
                             x-transition:enter-end="opacity-100 scale-100"
                             x-transition:leave="transition ease-in duration-75"
                             x-transition:leave-start="opacity-100 scale-100"
                             x-transition:leave-end="opacity-0 scale-95"
                             class="absolute z-[110] w-full mt-1.5 bg-white dark:bg-[#121212] border border-slate-200/80 dark:border-white/10 rounded-xl shadow-xl overflow-hidden py-1.5" 
                             style="display: none;">
                            
                            <!-- Search -->
                            <div class="px-2.5 pb-1.5 border-b border-slate-100 dark:border-white/5">
                                <div class="relative">
                                    <input type="text" x-model="search" placeholder="Pesquisar..." 
                                           class="w-full bg-slate-50 dark:bg-white/5 text-[10px] font-bold rounded-lg pl-7 pr-2.5 py-1.5 outline-none border border-slate-200/50 dark:border-white/5 text-slate-800 dark:text-white">
                                    <i data-lucide="search" class="w-3 h-3 absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                </div>
                            </div>
                            
                            <div class="max-h-36 overflow-y-auto pt-1 space-y-0.5 scrollbar-thin">
                                <button type="button" 
                                        @click="selectedVal = ''; selectedLabel = 'Selecione um fornecedor...'; open = false" 
                                        class="w-full text-left px-3 py-1.5 text-[10px] font-bold text-slate-600 dark:text-slate-350 hover:bg-slate-100 dark:hover:bg-white/5 transition-colors flex items-center justify-between">
                                    <span>Nenhum / Sem Fornecedor</span>
                                </button>
                                {% for f in fornecedores %}
                                <button type="button" 
                                        x-show="search === '' || '{{ f.nome|lower|escapejs }}'.includes(search.toLowerCase())"
                                        @click="selectedVal = '{{ f.id }}'; selectedLabel = '{{ f.nome|escapejs }}'; open = false" 
                                        class="w-full text-left px-3 py-1.5 text-[10px] font-bold text-slate-650 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-white/5 transition-colors flex items-center justify-between">
                                    <span>{{ f.nome }}</span>
                                    <span x-show="selectedVal === '{{ f.id }}'" class="text-brand flex items-center">
                                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                                    </span>
                                </button>
                                {% endfor %}
                            </div>
                        </div>
                        <input type="hidden" name="fornecedor_id" :value="selectedVal">
                    </div>
                </div>
                
                <div>
                    <label class="block text-[9px] font-black text-slate-450 dark:text-navie-textsec uppercase tracking-wider mb-1.5">Data da Compra</label>
                    <input type="text" name="data_compra" id="date-picker-compra" value="{{ hoje }}" 
                           class="w-full input-glass rounded-xl px-4 py-3 text-xs font-bold shadow-sm outline-none cursor-pointer text-slate-700 dark:text-white" 
                           placeholder="Selecione a data">
                </div>
            </div>

            <!-- Dynamic Items Area -->
            <div class="flex-1 flex flex-col min-h-0 border border-slate-200/50 dark:border-white/10 rounded-2xl overflow-hidden bg-slate-50 dark:bg-black/10">
                <!-- Header of dynamic table (Centered) -->
                <div class="grid grid-cols-12 gap-3 px-4 py-2.5 border-b border-slate-200/60 dark:border-white/5 bg-slate-100 dark:bg-white/5 text-[9px] font-black text-slate-400 dark:text-navie-textsec uppercase tracking-wider flex-shrink-0">
                    <div class="col-span-4 flex items-center justify-start py-0.5">Produto</div>
                    <div class="col-span-2 flex items-center justify-center py-0.5">Quantidade</div>
                    <div class="col-span-2 flex items-center justify-center py-0.5">Valor Total (R$)</div>
                    <div class="col-span-1.5 flex items-center justify-center py-0.5">Preço Unit.</div>
                    <div class="col-span-2 flex items-center justify-center py-0.5">Validade</div>
                    <div class="col-span-0.5 flex items-center justify-center py-0.5"></div>
                </div>

                <!-- Scrollable items list -->
                <div class="flex-1 overflow-y-auto p-4 space-y-3.5 min-h-0 scrollbar-thin">
                    <template x-for="(item, index) in itens" :key="index">
                        <div class="grid grid-cols-12 gap-3 items-center">
                            <!-- Custom select Product -->
                            <div class="col-span-4 relative">
                                <button @click="item.produto_select_open = !item.produto_select_open" type="button" 
                                        class="w-full input-glass rounded-xl px-3 py-2 text-xs font-bold shadow-sm outline-none flex items-center justify-between cursor-pointer border border-slate-200/50 dark:border-white/5 text-left text-slate-700 dark:text-white">
                                    <span x-text="item.produto_label" class="truncate">Selecione...</span>
                                    <svg class="w-3.5 h-3.5 text-slate-400 transition-transform duration-200 shrink-0 ml-1" :class="item.produto_select_open ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                                    </svg>
                                </button>
                                
                                <div x-show="item.produto_select_open" @click.away="item.produto_select_open = false"
                                     x-transition:enter="transition ease-out duration-100"
                                     x-transition:enter-start="opacity-0 scale-95"
                                     x-transition:enter-end="opacity-100 scale-100"
                                     x-transition:leave="transition ease-in duration-75"
                                     x-transition:leave-start="opacity-100 scale-100"
                                     x-transition:leave-end="opacity-0 scale-95"
                                     class="absolute z-[120] w-full mt-1.5 bg-white dark:bg-[#121212] border border-slate-200/80 dark:border-white/10 rounded-xl shadow-xl overflow-hidden py-1.5"
                                     style="display: none;">
                                     
                                    <!-- Search -->
                                    <div class="px-2 pb-1.5 border-b border-slate-100 dark:border-white/5">
                                        <div class="relative">
                                            <input type="text" x-model="item.produto_search" placeholder="Pesquisar..." 
                                                   class="w-full bg-slate-50 dark:bg-white/5 text-[10px] font-bold rounded-lg pl-7 pr-2 py-1.5 outline-none border border-slate-200/50 dark:border-white/5 text-slate-800 dark:text-white">
                                            <i data-lucide="search" class="w-3 h-3 absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                        </div>
                                    </div>
                                    
                                    <!-- List -->
                                    <div class="max-h-36 overflow-y-auto pt-1 space-y-0.5 scrollbar-thin">
                                        <template x-for="p in produtosList" :key="p.id">
                                            <button type="button" 
                                                    x-show="item.produto_search === '' || p.nome.toLowerCase().includes(item.produto_search.toLowerCase())"
                                                    @click="
                                                        item.produto_id = p.id; 
                                                        item.produto_label = p.nome + ' (' + p.unidade + ')'; 
                                                        item.produto_select_open = false;
                                                    " 
                                                    class="w-full text-left px-3 py-1.5 text-[10px] font-bold text-slate-650 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-white/5 transition-colors flex items-center justify-between">
                                                <span x-text="p.nome"></span>
                                                <span x-show="item.produto_id === p.id" class="text-brand flex items-center">
                                                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                                                </span>
                                            </button>
                                        </template>
                                    </div>
                                </div>
                                <input type="hidden" name="item_produto_id" :value="item.produto_id">
                            </div>
                            
                            <!-- Quantity -->
                            <div class="col-span-2 flex items-center justify-center">
                                <input type="text" name="item_quantidade" x-model="item.quantidade_raw" required 
                                       @blur="item.quantidade_raw = formatQtyDisplay(item.quantidade_raw)"
                                       class="w-full input-glass rounded-xl px-3 py-2 text-xs font-bold text-center outline-none text-slate-700 dark:text-white" 
                                       placeholder="1">
                            </div>
                            
                            <!-- Total Price -->
                            <div class="col-span-2 flex items-center justify-center">
                                <input type="text" name="item_valor_total" x-model="item.valor_total_raw" required 
                                       @blur="item.valor_total_raw = formatBRLDisplay(item.valor_total_raw)"
                                       class="w-full input-glass rounded-xl px-3 py-2 text-xs font-bold text-center outline-none text-slate-700 dark:text-white" 
                                       placeholder="0,00">
                            </div>

                            <!-- Unit Price calculated -->
                            <div class="col-span-1.5 flex items-center justify-center text-center">
                                <span class="text-brand font-black text-xs" x-text="getUnitPrice(item)"></span>
                            </div>
                            
                            <!-- Expiry date -->
                            <div class="col-span-2 flex items-center justify-center">
                                <input type="date" name="item_validade" x-model="item.validade" 
                                       class="w-full input-glass rounded-xl px-2 py-2 text-xs font-bold text-center outline-none cursor-pointer text-slate-700 dark:text-white">
                            </div>
                            
                            <!-- Delete button -->
                            <div class="col-span-0.5 flex items-center justify-center">
                                <button type="button" @click="removeItem(index)" 
                                        class="w-8 h-8 rounded-xl bg-red-100 hover:bg-red-200 dark:bg-red-500/10 dark:hover:bg-red-500/20 text-red-600 dark:text-red-400 flex items-center justify-center transition-all scale-100 active:scale-95 cursor-pointer">
                                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
                
                <!-- Footer of table (Grand Total & Add item button) -->
                <div class="flex items-center justify-between px-4 py-3 border-t border-slate-200/60 dark:border-white/5 bg-slate-100/50 dark:bg-white/5 flex-shrink-0">
                    <button type="button" @click="addItem()" 
                            class="px-4 py-2 bg-white hover:bg-slate-50 dark:bg-white/5 dark:hover:bg-white/10 border border-slate-200 dark:border-white/10 text-slate-700 dark:text-white rounded-xl text-xs font-black flex items-center gap-1.5 hover:scale-[1.02] active:scale-95 transition-transform cursor-pointer">
                        <i data-lucide="plus-circle" class="w-4 h-4 text-brand"></i>
                        <span>Adicionar Item</span>
                    </button>
                    <div class="text-right">
                        <span class="text-[9px] font-black text-slate-450 dark:text-navie-textsec uppercase block tracking-wider">Total Geral</span>
                        <span class="text-lg font-black text-slate-800 dark:text-white" x-text="grandTotal"></span>
                    </div>
                </div>
            </div>

            <!-- Observações -->
            <div class="flex-shrink-0">
                <label class="block text-[9px] font-black text-slate-450 dark:text-navie-textsec uppercase tracking-wider mb-1.5">Observações / Notas</label>
                <input type="text" name="observacao" value="{{ observacao|default:'' }}"
                       class="w-full input-glass rounded-xl px-4 py-2.5 text-xs font-bold shadow-sm outline-none focus:outline-none text-slate-700 dark:text-white" 
                       placeholder="Ex: Nota fiscal Nº 1234, pagamento via PIX...">
            </div>

            <!-- Footer Actions -->
            <div class="flex gap-3 pt-3.5 border-t border-slate-100 dark:border-white/5 flex-shrink-0">
                <button type="button" @click="open = false; setTimeout(() => { document.getElementById('modal-container').innerHTML = '' }, 250)" 
                        class="flex-1 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest text-slate-500 dark:text-navie-textsec hover:bg-slate-50 dark:hover:bg-white/5 transition-colors cursor-pointer">
                    Cancelar
                </button>
                <button type="submit" 
                        class="flex-1 py-3 rounded-xl bg-brand hover:bg-brand/90 text-white font-black text-[9px] uppercase tracking-widest shadow-xl shadow-brand/20 hover:scale-[1.02] active:scale-95 transition-all cursor-pointer">
                    Registrar Compra
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    #scanner-preview video {
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
        border-radius: 1.5rem;
    }
</style>

<script>
    if(typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
    if (typeof flatpickr !== 'undefined') {
        flatpickr("#date-picker-compra", {
            locale: "pt",
            dateFormat: "Y-m-d",
            altInput: true,
            altFormat: "d/m/Y",
            disableMobile: "true"
        });
    }
</script>
