<style>
    @media (min-width: 1024px) {
        .acomodacoes-grid-desktop {
            grid-template-columns: repeat(5, minmax(0, 1fr)) !important;
        }
    }
</style>

<div class="space-y-4">
    <!-- Cabeçalho com tracinho vertical na cor do hotel -->
    <div class="flex flex-col text-left mb-6 pl-4 border-l-4" style="border-color: var(--brand-color) !important;">
        <span class="text-[11px] font-black uppercase tracking-widest text-slate-400 mb-1.5 block">Nossas Acomodações</span>
        <h3 class="text-2xl md:text-3xl lg:text-4xl font-black text-gray-900 leading-tight tracking-tight">Quartos prontos para você</h3>
    </div>
    
    <!-- Grid que assume 5 colunas em telas desktop a partir de LG (1024px) -->
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 acomodacoes-grid-desktop gap-4 md:gap-5" id="lista-quartos">
        {% for quarto in quartos %}
        {% include 'hoteis/partials/quarto_card.html' with quarto=quarto hotel=hotel %}
        {% empty %}
        <div class="col-span-full py-16 text-center bg-slate-50 rounded-3xl border border-slate-100">
            <i data-lucide="bed-double" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
            <p class="text-gray-500 font-medium">Sem acomodações cadastradas no momento.</p>
        </div>
        {% endfor %}
    </div>
</div>
