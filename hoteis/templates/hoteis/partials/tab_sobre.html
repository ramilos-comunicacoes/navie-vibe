<div class="space-y-8">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Descrição Institucional -->
        <!-- Estilo Airbnb: Sem bordas duras, sombras mais leves, mais espaço interno -->
        <div class="bg-white p-8 rounded-3xl space-y-4">
            <div class="flex items-center gap-3 mb-4">
                <h3 class="text-2xl font-black text-gray-900 font-display">Sobre a Hospedagem</h3>
            </div>
            <p class="text-gray-600 leading-relaxed text-base">{{ hotel.descricao|linebreaksbr }}</p>
        </div>

        <!-- Localização e Endereço -->
        <div class="bg-white p-8 rounded-3xl space-y-4">
            <div class="flex items-center gap-3 mb-4">
                <h3 class="text-2xl font-black text-gray-900 font-display">Como Chegar</h3>
            </div>
            <p class="text-gray-600 leading-relaxed text-base font-medium">{{ hotel.local.endereco }}, {{ hotel.local.cidade }} - {{ hotel.local.estado }}</p>
            
            <!-- Leaflet Map para visualização rápida no B2C -->
            <div id="mapaB2C" class="w-full h-64 rounded-2xl overflow-hidden z-20 mt-4"></div>
        </div>
    </div>

    <!-- Galeria de Imagens Carrossel -->
    {% if imagens %}
    <div class="bg-white p-8 rounded-3xl space-y-4 mt-8">
        <div class="flex items-center gap-3 mb-4">
            <h3 class="text-2xl font-black text-gray-900 font-display">Galeria de Fotos</h3>
        </div>
        <div class="swiper hotel-swiper h-64 md:h-[400px] w-full rounded-[2rem] overflow-hidden bg-gray-100 z-0">
            <div class="swiper-wrapper">
                {% for img in imagens %}
                <div class="swiper-slide">
                    <img src="{{ img.url_imagem.url }}" class="w-full h-full object-cover" />
                </div>
                {% endfor %}
            </div>
            <div class="swiper-pagination"></div>
        </div>
    </div>
    {% endif %}
</div>
