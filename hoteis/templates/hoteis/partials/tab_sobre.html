<div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-16">
    <!-- Descrição Institucional -->
    <div class="space-y-5">
        <h3 class="text-3xl font-black font-display tracking-tight">Sobre a Hospedagem</h3>
        <p class="leading-relaxed text-base opacity-90 font-medium">{{ hotel.descricao|linebreaksbr }}</p>
    </div>

    <!-- Localização e Endereço -->
    <div class="space-y-5">
        <div class="flex items-center justify-between gap-3 flex-wrap">
            <h3 class="text-3xl font-black font-display tracking-tight">Como Chegar</h3>
            
            <!-- Alternador Mapa / Satélite Customizado B2C -->
            <div class="flex items-center map-toggle-container p-0.5 rounded-xl">
                <button type="button" 
                        id="btn-b2c-satellite"
                        class="map-toggle-btn active px-3 py-1 text-[10px] rounded-lg border-none transition-all cursor-pointer font-bold">
                    Satélite
                </button>
                <button type="button" 
                        id="btn-b2c-roadmap"
                        class="map-toggle-btn px-3 py-1 text-[10px] rounded-lg border-none transition-all cursor-pointer font-bold">
                    Mapa Padrão
                </button>
            </div>
        </div>
        <p class="leading-relaxed text-base font-medium opacity-90">{{ hotel.local.endereco }}, {{ hotel.local.cidade }} - {{ hotel.local.estado }}</p>
        
        <!-- Leaflet Map para visualização rápida no B2C -->
        <div id="mapaB2C" class="w-full h-72 rounded-2xl overflow-hidden z-20 mt-6 shadow-lg border"></div>
    </div>
</div>

<!-- Galeria de Imagens Carrossel -->
{% if imagens %}
<div class="mt-16 md:mt-20 pt-12 border-t border-t-brand-sep">
    <div class="flex items-center gap-3 mb-6">
        <h3 class="text-3xl font-black font-display tracking-tight">Galeria de Fotos</h3>
    </div>
    <div class="swiper hotel-swiper h-64 md:h-[450px] w-full rounded-[2.5rem] overflow-hidden bg-black/10 z-0 shadow-xl border border-white/5">
        <div class="swiper-wrapper">
            {% for img in imagens %}
            <div class="swiper-slide">
                <img src="{{ img.url_imagem.url }}" class="w-full h-full object-cover" />
            </div>
            {% endfor %}
        </div>
        <div class="swiper-pagination"></div>
    </div>
</div>
{% endif %}
